# 2026 世界杯比分预测 · docker-compose
# 用法：
#   1. 复制 .env.example 为 .env，填入你的 ODDS_API_KEY
#   2. docker compose up -d --build
#   3. 访问 http://你的VPS_IP:6889
# 赔率 key 从 .env 读取（.env 已被 .gitignore 忽略，不会泄露）
services:
  shijiebei:
    build: .
    container_name: shijiebei
    ports:
      - "6889:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
      - ODDS_API_KEY=${ODDS_API_KEY:-}   # 从 .env 读取；留空则降级纯模型
    # 容器内健康检查（可选）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/data')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
