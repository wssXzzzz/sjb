# 2026 世界杯比分预测 · docker-compose
# 用法：docker compose up -d --build
# 然后访问 http://你的VPS_IP:6889
services:
  shijiebei:
    build: .
    container_name: shijiebei
    ports:
      - "6889:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
    # 容器内健康检查（可选）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/data')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
